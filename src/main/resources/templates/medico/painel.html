<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/header :: head('Consultas pendentes')}"></head>
<body>
    <header th:replace="~{fragments/header :: nav-medico}"></header>

    <main>
        <div class="page-header">
            <div>
                <h1>Consultas pendentes</h1>
                <p th:text="'Olá, Dr(a). ' + ${medico.nome} + '. Estas são suas consultas ainda não realizadas.'">
                    Consultas pendentes
                </p>
            </div>
        </div>

        <div class="tabela-wrap">
            <table>
                <thead>
                    <tr>
                        <th>Data/Hora</th>
                        <th>Paciente</th>
                        <th>Status</th>
                        <th></th>
                    </tr>
                </thead>
                <tbody>
                    <tr th:each="consulta : ${consultas}">
                        <td th:text="${consulta.dataHora}">2026-07-06 14:30</td>
                        <td th:text="${consulta.paciente.nome}">Nome do paciente</td>
                        <td><span class="badge badge-pendente">Pendente</span></td>
                        <td class="acoes">
                            <a th:href="@{/medico/atendimento/{codigo}(codigo=${consulta.codigo})}">Atender</a>
                        </td>
                    </tr>
                    <tr th:if="${#lists.isEmpty(consultas)}">
                        <td colspan="4" class="vazio">Nenhuma consulta pendente no momento.</td>
                    </tr>
                </tbody>
            </table>
        </div>
    </main>

    <footer th:replace="~{fragments/footer :: footer}"></footer>
</body>
</html>
